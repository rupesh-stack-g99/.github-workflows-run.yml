name: H1 Check

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Download code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run script
        run: python script.py
